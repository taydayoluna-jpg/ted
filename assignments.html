<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assignments Portal — Crest Academy International</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-main: #040714;
      --bg-card: #0b112c;
      --bg-input: #12193d;
      --accent-primary: #38bdf8;
      --accent-hover: #0288d1;
      --text-main: #f1f5f9;
      --text-muted: #64748b;
      --border-color: rgba(56, 189, 248, 0.15);
      --success: #10b981;
      --danger: #ef4444;
      --warn: #f59e0b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background-color: var(--bg-main); color: var(--text-main); padding: 30px 5% 80px; max-width: 1100px; margin: 0 auto; }

    header { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; border-bottom:1px solid var(--border-color); padding-bottom:20px; flex-wrap:wrap; gap:14px; }
    h1 { font-size: 22px; font-weight: 800; }
    h1 span { color: var(--accent-primary); }
    .role-badge { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; padding:6px 14px; border-radius:20px; background: rgba(56,189,248,0.1); color: var(--accent-primary); border:1px solid var(--border-color); }
    .role-badge.admin-mode { background: rgba(245,158,11,0.1); color: var(--warn); border-color: rgba(245,158,11,0.25); }

    .tabs { display:flex; gap:10px; margin-bottom:25px; flex-wrap:wrap; }
    .tab-btn { padding:10px 20px; background: var(--bg-input); border:1px solid var(--border-color); border-radius:12px; color: var(--text-muted); font-size:13px; font-weight:600; cursor:pointer; transition: all 0.2s; }
    .tab-btn.active, .tab-btn:hover { background: rgba(56,189,248,0.12); color:#fff; border-color: var(--accent-primary); }

    .panel-card { background: var(--bg-card); border:1px solid var(--border-color); border-radius:20px; padding:28px; margin-bottom:22px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
    .panel-card h3 { font-size:15px; font-weight:700; margin-bottom:18px; color:#fff; display:flex; align-items:center; gap:10px; }

    .form-grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
    @media (max-width:700px) { .form-grid { grid-template-columns:1fr; } }
    .form-group { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size:11px; font-weight:700; color: var(--accent-primary); text-transform:uppercase; letter-spacing:0.05em; }
    .form-group input, .form-group select, .form-group textarea {
      width:100%; padding:12px 14px; background: var(--bg-input); border:1px solid rgba(255,255,255,0.06);
      border-radius:10px; color:#fff; font-size:13px; outline:none; font-family:'Poppins',sans-serif; transition: all 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent-primary); background:#16204d; }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .upload-zone { border:2px dashed var(--border-color); border-radius:12px; padding:22px; text-align:center; background: rgba(56,189,248,0.02); cursor:pointer; transition: all 0.2s; }
    .upload-zone:hover { border-color: var(--accent-primary); background: rgba(56,189,248,0.05); }
    .upload-zone i { font-size:26px; color: var(--text-muted); margin-bottom:8px; }
    .upload-zone p { font-size:12px; color: var(--text-muted); }
    .upload-zone .file-tag { margin-top:8px; font-weight:700; color: var(--success); font-size:12px; display:none; }

    .action-btn { padding:14px 24px; background: linear-gradient(135deg, var(--accent-hover), var(--accent-primary)); color:#040714; border:none; border-radius:12px; font-size:14px; font-weight:700; cursor:pointer; transition: all 0.2s; display:inline-flex; align-items:center; gap:10px; box-shadow: 0 4px 20px rgba(56,189,248,0.25); }
    .action-btn:hover { transform: translateY(-2px); }
    .action-btn:disabled { background: var(--bg-input); color: var(--text-muted); cursor:not-allowed; transform:none; box-shadow:none; }
    .action-btn.ghost { background: var(--bg-input); color:var(--text-main); border:1px solid var(--border-color); box-shadow:none; }
    .action-btn.small { padding: 8px 16px; font-size:12px; }

    .status-msg { margin-top:14px; padding:12px; border-radius:10px; font-size:13px; font-weight:500; }
    .status-msg.success { background: rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.2); color: var(--success); }
    .status-msg.danger { background: rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); color: var(--danger); }
    .status-msg.info { background: rgba(56,189,248,0.08); border:1px solid rgba(56,189,248,0.2); color: var(--accent-primary); }

    .assignment-card { background: rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); border-radius:14px; padding:18px 20px; margin-bottom:14px; }
    .assignment-card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; }
    .assignment-title { font-size:15px; font-weight:700; color:#fff; margin-bottom:4px; }
    .assignment-meta { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
    .meta-chip { font-size:10px; font-weight:700; padding:4px 10px; border-radius:20px; background: rgba(56,189,248,0.1); color: var(--accent-primary); text-transform:uppercase; letter-spacing:0.04em; }
    .meta-chip.due { background: rgba(245,158,11,0.1); color: var(--warn); }
    .meta-chip.overdue { background: rgba(239,68,68,0.1); color: var(--danger); }
    .assignment-instructions { font-size:13px; color:#cbd5e1; line-height:1.5; margin-top:10px; white-space:pre-wrap; }
    .assignment-attachment { margin-top:10px; }
    .assignment-attachment a { color: var(--accent-primary); font-size:12px; font-weight:600; text-decoration:underline; }

    .submission-row { background: rgba(255,255,255,0.015); border:1px solid rgba(255,255,255,0.04); border-radius:12px; padding:14px 16px; margin-top:10px; }
    .submission-row-top { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
    .submission-student { font-size:13px; font-weight:700; color:#fff; }
    .submission-time { font-size:10px; color: var(--text-muted); }
    .grade-pill { font-size:11px; font-weight:700; padding:4px 12px; border-radius:20px; }
    .grade-pill.pending { background: rgba(245,158,11,0.12); color: var(--warn); }
    .grade-pill.graded { background: rgba(16,185,129,0.12); color: var(--success); }

    .del-icon-btn { background:none; border:none; color: var(--text-muted); cursor:pointer; font-size:13px; padding:4px 8px; opacity:0.6; transition: opacity 0.2s; }
    .del-icon-btn:hover { opacity:1; color: var(--danger); }

    .spinner { width:14px; height:14px; border:2px solid rgba(255,255,255,0.2); border-top-color:#040714; border-radius:50%; animation: spin 0.7s linear infinite; display:inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { text-align:center; color: var(--text-muted); font-style: italic; padding:40px 0; font-size:13px; }

    .login-gate { max-width: 480px; margin: 60px auto; background: var(--bg-card); border:1px solid var(--border-color); border-radius:20px; padding:35px; text-align:center; }
    .login-gate i { font-size:36px; color: var(--accent-primary); margin-bottom:14px; }
    .login-gate h2 { font-size:18px; margin-bottom:8px; }
    .login-gate p { font-size:13px; color: var(--text-muted); margin-bottom:20px; }
  </style>
</head>
<body>

  <header>
    <h1>Assignments <span>Portal</span></h1>
    <span class="role-badge" id="roleBadge">Student View</span>
  </header>

  <div id="appRoot"></div>

  <script>
    // ===========================================================
    // CONFIG — shared with admin.html / index.html / reorganize.html
    // ===========================================================
    const API_KEY = "$2a$10$q1K8WzlWXgpkdX5BYcLBfuiYIdv7ZrDcy2OjEiGlXdWC2Y5/CB7e6";

    const WORK_BIN_ID = "6a423432da38895dfe0eecc9";
    const WORK_BASE_URL = "https://api.jsonbin.io/v3/b/" + WORK_BIN_ID;

    const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dfrnpdnld/auto/upload";
    const CLOUDINARY_PRESET = "taydayo";
    const CHUNK_SIZE = 20 * 1024 * 1024;

    // Email delivery — same Web3Forms key already used in index.html's request desk.
    const WEB3FORMS_ACCESS_KEY = "1f013961-d89a-47f7-bc14-dc7872ecf8da";

    const localSubjects = {
      primary: ["Mathematics", "English", "Chichewa", "Primary Science", "Social Studies", "Life Skills"],
      secondary: ["Mathematics", "Physics", "Chemistry", "Biology", "English Literature", "History", "Geography", "Computer Science", "Business Studies", "Agriculture"],
      tertiary: ["Computer Engineering", "Advanced Calculus", "Data Structures", "Business Management", "Medicine & Health", "Education"]
    };
    const localClasses = {
      primary: ['Standard 1','Standard 2','Standard 3','Standard 4','Standard 5','Standard 6','Standard 7','Standard 8'],
      secondary: ['Form 1','Form 2','Form 3','Form 4'],
      tertiary: ['Year 1','Year 2','Year 3','Year 4']
    };

    // ===========================================================
    // ROLE DETECTION — admin.html links here with ?role=admin
    // ===========================================================
    const urlParams = new URLSearchParams(window.location.search);
    const isAdminView = urlParams.get('role') === 'admin';

    document.getElementById('roleBadge').textContent = isAdminView ? 'Faculty Console' : 'Student View';
    if (isAdminView) document.getElementById('roleBadge').classList.add('admin-mode');

    // ===========================================================
    // SHARED DATA HELPERS
    // ===========================================================
    async function getWorkData() {
      try {
        const res = await fetch(WORK_BASE_URL + "/latest", {
          headers: { "X-Master-Key": API_KEY, "X-Bin-Meta": "false" }
        });
        const data = await res.json();
        return { assignments: data.assignments || [], submissions: data.submissions || [] };
      } catch (err) {
        console.error("Failed to fetch assignments data:", err);
        return { assignments: [], submissions: [] };
      }
    }

    async function saveWorkData(workData) {
      try {
        await fetch(WORK_BASE_URL, {
          method: "PUT",
          headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
          body: JSON.stringify(workData)
        });
      } catch (err) {
        console.error("Failed to save assignments data:", err);
        throw err;
      }
    }

    function generateId() {
      return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
    }

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function isOverdue(dueDateIso) {
      if (!dueDateIso) return false;
      return new Date(dueDateIso) < new Date();
    }

    // Chunked Cloudinary upload — identical helper to admin.html / index.html,
    // needed so worksheets, submitted files, and graded result files don't get
    // cut off on slow connections.
    async function uploadToCloudinaryChunked(file, onProgress) {
      if (file.size <= CHUNK_SIZE) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', CLOUDINARY_PRESET);
        const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
        if (!res.ok) {
          let detail = '';
          try { detail = (await res.json()).error?.message || ''; } catch(e) {}
          throw new Error(`Upload failed (status ${res.status})${detail ? ': ' + detail : ''}`);
        }
        return await res.json();
      }

      const uniqueUploadId = 'crest-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
      const totalSize = file.size;
      let start = 0;
      let lastResponse = null;

      while (start < totalSize) {
        const end = Math.min(start + CHUNK_SIZE, totalSize);
        const chunk = file.slice(start, end);
        const formData = new FormData();
        formData.append('file', chunk, file.name || 'upload');
        formData.append('upload_preset', CLOUDINARY_PRESET);
        formData.append('cloud_name', 'dfrnpdnld');

        const res = await fetch(CLOUDINARY_URL, {
          method: 'POST',
          headers: {
            'X-Unique-Upload-Id': uniqueUploadId,
            'Content-Range': `bytes ${start}-${end - 1}/${totalSize}`
          },
          body: formData
        });
        if (!res.ok) {
          let detail = '';
          try { detail = (await res.json()).error?.message || ''; } catch(e) {}
          throw new Error(`Chunk upload failed at byte ${start} (status ${res.status})${detail ? ': ' + detail : ''}`);
        }
        lastResponse = await res.json();
        if (onProgress) onProgress(Math.round((end / totalSize) * 100));
        start = end;
      }
      return lastResponse;
    }

    // Sends an email via Web3Forms — used both for "new assignment posted" pings
    // (optional) and "your work has been graded" notifications.
    async function sendEmailNotification(toEmailHint, subject, fields) {
      if (!WEB3FORMS_ACCESS_KEY) return { success: false, message: 'Email not configured' };
      try {
        const response = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
          body: Object.assign({
            access_key: WEB3FORMS_ACCESS_KEY,
            subject: subject,
            from_name: "Crest Academy Assignments Portal",
            "Recipient (for reference)": toEmailHint || "not provided"
          }, fields)
        });
        return await response.json();
      } catch (err) {
        console.error("Email notification failed:", err);
        return { success: false, message: err.message };
      }
    }
    // ===========================================================
    // ADMIN VIEW
    // ===========================================================
    let adminWorkDataCache = { assignments: [], submissions: [] };
    let adminActiveTab = 'post';

    function renderAdminRoot() {
      const root = document.getElementById('appRoot');
      root.innerHTML = `
        <div class="tabs">
          <button class="tab-btn ${adminActiveTab === 'post' ? 'active' : ''}" onclick="setAdminTab('post')"><i class="fas fa-pen-to-square"></i> Post Assignment</button>
          <button class="tab-btn ${adminActiveTab === 'manage' ? 'active' : ''}" onclick="setAdminTab('manage')"><i class="fas fa-list-check"></i> Manage & Grade</button>
        </div>
        <div id="adminTabContent"></div>
      `;
      renderAdminTabContent();
    }

    function setAdminTab(tab) {
      adminActiveTab = tab;
      renderAdminRoot();
    }

    function renderAdminTabContent() {
      const container = document.getElementById('adminTabContent');
      if (adminActiveTab === 'post') {
        container.innerHTML = adminPostFormHtml();
        adaptAdminLevelOptions();
      } else {
        renderAdminManageTab();
      }
    }

    function adminPostFormHtml() {
      return `
        <div class="panel-card">
          <h3><i class="fas fa-pen-to-square" style="color:var(--accent-primary);"></i> New Assignment</h3>
          <div class="form-grid">
            <div class="form-group full">
              <label>Title</label>
              <input type="text" id="aTitle" placeholder="e.g. Biology Form 2 — Photosynthesis Worksheet" />
            </div>
            <div class="form-group">
              <label>Level</label>
              <select id="aLevel" onchange="adaptAdminLevelOptions()">
                <option value="primary">Primary School Tier</option>
                <option value="secondary" selected>Secondary School Tier</option>
                <option value="tertiary">Tertiary Advanced Level</option>
                <option value="all">All Levels (everyone)</option>
              </select>
            </div>
            <div class="form-group">
              <label>Class / Form</label>
              <select id="aClass"></select>
            </div>
            <div class="form-group">
              <label>Subject</label>
              <select id="aSubject"></select>
            </div>
            <div class="form-group">
              <label>Due Date (optional)</label>
              <input type="date" id="aDueDate" />
            </div>
            <div class="form-group full">
              <label>Instructions</label>
              <textarea id="aInstructions" placeholder="Describe the task, what to submit, and any requirements..."></textarea>
            </div>
            <div class="form-group full">
              <label>Attach a worksheet / question paper (optional)</label>
              <div class="upload-zone" onclick="document.getElementById('aFileInput').click()">
                <input type="file" id="aFileInput" style="display:none;" onchange="handleAdminAssignmentFile(event)" />
                <i class="fas fa-paperclip"></i>
                <p id="aFilePrompt">Click to attach a file for students to download</p>
                <p class="file-tag" id="aFileTag"></p>
              </div>
            </div>
          </div>
          <button class="action-btn" id="postAssignmentBtn" onclick="postNewAssignment()" style="margin-top:6px;"><i class="fas fa-paper-plane"></i> Post Assignment</button>
          <div id="postStatus"></div>
        </div>
      `;
    }

    function adaptAdminLevelOptions() {
      const level = document.getElementById('aLevel').value;
      const classSelect = document.getElementById('aClass');
      const subjSelect = document.getElementById('aSubject');

      if (level === 'all') {
        classSelect.innerHTML = `<option value="">All Classes</option>`;
        subjSelect.innerHTML = `<option value="">All Subjects</option>`;
        return;
      }
      classSelect.innerHTML = `<option value="">All Classes in ${level}</option>` + localClasses[level].map(c => `<option value="${c}">${c}</option>`).join('');
      subjSelect.innerHTML = `<option value="">All Subjects in ${level}</option>` + localSubjects[level].map(s => `<option value="${s}">${s}</option>`).join('');
    }

    let stagedAssignmentFile = null;
    function handleAdminAssignmentFile(e) {
      const file = e.target.files[0];
      if (!file) return;
      stagedAssignmentFile = file;
      document.getElementById('aFilePrompt').style.display = 'none';
      const tag = document.getElementById('aFileTag');
      tag.textContent = `📎 ${file.name}`;
      tag.style.display = 'block';
    }

    async function postNewAssignment() {
      const title = document.getElementById('aTitle').value.trim();
      const level = document.getElementById('aLevel').value;
      const className = document.getElementById('aClass').value;
      const subject = document.getElementById('aSubject').value;
      const dueDate = document.getElementById('aDueDate').value;
      const instructions = document.getElementById('aInstructions').value.trim();
      const btn = document.getElementById('postAssignmentBtn');
      const statusEl = document.getElementById('postStatus');

      if (!title || !instructions) {
        statusEl.innerHTML = `<div class="status-msg danger">Please add at least a title and instructions.</div>`;
        return;
      }

      btn.disabled = true;
      statusEl.innerHTML = `<div class="status-msg info">🔄 Posting assignment...</div>`;

      try {
        let fileUrl = null;
        if (stagedAssignmentFile) {
          statusEl.innerHTML = `<div class="status-msg info">🚀 Uploading attached worksheet...</div>`;
          const cloudData = await uploadToCloudinaryChunked(stagedAssignmentFile, (pct) => {
            statusEl.innerHTML = `<div class="status-msg info">🚀 Uploading worksheet... ${pct}%</div>`;
          });
          fileUrl = cloudData.secure_url;
        }

        const workData = await getWorkData();
        workData.assignments.push({
          id: generateId(),
          title, level, className, subject, dueDate,
          instructions,
          fileUrl,
          postedAt: new Date().toISOString()
        });
        await saveWorkData(workData);

        statusEl.innerHTML = `<div class="status-msg success">✅ Assignment posted! Students in the matching level/class will see it.</div>`;
        document.getElementById('aTitle').value = '';
        document.getElementById('aInstructions').value = '';
        document.getElementById('aDueDate').value = '';
        stagedAssignmentFile = null;
        document.getElementById('aFilePrompt').style.display = 'block';
        document.getElementById('aFileTag').style.display = 'none';
      } catch (err) {
        statusEl.innerHTML = `<div class="status-msg danger">❌ Failed to post: ${err.message}</div>`;
        console.error(err);
      } finally {
        btn.disabled = false;
      }
    }

    async function renderAdminManageTab() {
      const container = document.getElementById('adminTabContent');
      container.innerHTML = `<div class="panel-card"><div class="empty-state"><span class="spinner" style="border-top-color:var(--accent-primary);"></span> Loading assignments and submissions...</div></div>`;

      const workData = await getWorkData();
      adminWorkDataCache = workData;

      if (workData.assignments.length === 0) {
        container.innerHTML = `<div class="panel-card"><div class="empty-state"><i class="fas fa-inbox" style="font-size:24px; display:block; margin-bottom:10px;"></i>No assignments posted yet.</div></div>`;
        return;
      }

      const sorted = [...workData.assignments].sort((a, b) => new Date(b.postedAt) - new Date(a.postedAt));

      container.innerHTML = sorted.map(a => {
        const subs = workData.submissions.filter(s => s.assignmentId === a.id);
        const pendingCount = subs.filter(s => s.status !== 'graded').length;
        const overdue = isOverdue(a.dueDate);

        return `
          <div class="panel-card">
            <div class="assignment-card-top">
              <div>
                <div class="assignment-title">${a.title}</div>
                <div class="assignment-meta">
                  <span class="meta-chip">${a.level === 'all' ? 'All Levels' : a.level}</span>
                  ${a.className ? `<span class="meta-chip">${a.className}</span>` : ''}
                  ${a.subject ? `<span class="meta-chip">${a.subject}</span>` : ''}
                  ${a.dueDate ? `<span class="meta-chip ${overdue ? 'overdue' : 'due'}">Due ${formatDate(a.dueDate)}</span>` : ''}
                  <span class="meta-chip" style="background:rgba(255,255,255,0.05); color:var(--text-muted);">${subs.length} submission${subs.length === 1 ? '' : 's'}${pendingCount > 0 ? ` · ${pendingCount} pending` : ''}</span>
                </div>
              </div>
              <button class="del-icon-btn" onclick="deleteAssignment('${a.id}')" title="Delete assignment"><i class="fas fa-trash-can"></i></button>
            </div>
            <div class="assignment-instructions">${a.instructions}</div>
            ${a.fileUrl ? `<div class="assignment-attachment"><a href="${a.fileUrl}" target="_blank"><i class="fas fa-paperclip"></i> View attached worksheet</a></div>` : ''}

            <div style="margin-top:16px;">
              ${subs.length === 0
                ? `<div class="empty-state" style="padding:16px 0;">No submissions yet.</div>`
                : subs.sort((x,y) => new Date(y.submittedAt) - new Date(x.submittedAt)).map(s => renderSubmissionRow(s)).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    function renderSubmissionRow(s) {
      const graded = s.status === 'graded';
      return `
        <div class="submission-row" id="sub-${s.id}">
          <div class="submission-row-top">
            <div>
              <div class="submission-student"><i class="fas fa-user" style="color:var(--text-muted); margin-right:6px;"></i>${s.studentName} <span style="color:var(--text-muted); font-weight:400; font-size:11px;">(${s.studentPhone})</span></div>
              <div class="submission-time">Submitted ${new Date(s.submittedAt).toLocaleString()}</div>
            </div>
            <span class="grade-pill ${graded ? 'graded' : 'pending'}">${graded ? `Graded: ${s.score}` : 'Pending'}</span>
          </div>

          ${s.textAnswer ? `<div style="margin-top:10px; font-size:13px; color:#cbd5e1; white-space:pre-wrap; background:rgba(255,255,255,0.02); padding:10px; border-radius:8px;">${s.textAnswer}</div>` : ''}
          ${s.fileUrl ? `<div style="margin-top:8px;"><a href="${s.fileUrl}" target="_blank" style="color:var(--accent-primary); font-size:12px; font-weight:600; text-decoration:underline;"><i class="fas fa-paperclip"></i> View submitted file</a></div>` : ''}

          ${graded ? `
            <div style="margin-top:10px; padding:10px; background:rgba(16,185,129,0.05); border:1px solid rgba(16,185,129,0.15); border-radius:8px;">
              <div style="font-size:11px; font-weight:700; color:var(--success); text-transform:uppercase; margin-bottom:4px;">Feedback sent to student</div>
              <div style="font-size:12px; color:#e2e8f0;">${s.feedback || '(no written feedback)'}</div>
            </div>
            <button class="action-btn ghost small" onclick="toggleGradeForm('${s.id}')" style="margin-top:10px;"><i class="fas fa-pen"></i> Edit Grade</button>
          ` : `
            <button class="action-btn small" onclick="toggleGradeForm('${s.id}')" style="margin-top:10px;"><i class="fas fa-graduation-cap"></i> Grade This</button>
          `}

          <div id="gradeForm-${s.id}" style="display:none; margin-top:12px;">
            <div class="form-grid">
              <div class="form-group">
                <label>Score</label>
                <input type="text" id="score-${s.id}" placeholder="e.g. 18/20 or A" value="${graded ? (s.score || '') : ''}" />
              </div>
              <div class="form-group full">
                <label>Feedback / Comments</label>
                <textarea id="feedback-${s.id}" placeholder="Write your feedback here...">${graded ? (s.feedback || '') : ''}</textarea>
              </div>
            </div>
            <button class="action-btn small" onclick="submitGrade('${s.id}')"><i class="fas fa-envelope"></i> Save & Email Student</button>
            <div id="gradeStatus-${s.id}"></div>
          </div>
        </div>
      `;
    }

    function toggleGradeForm(submissionId) {
      const el = document.getElementById('gradeForm-' + submissionId);
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    async function deleteAssignment(assignmentId) {
      if (!confirm("Delete this assignment and all its submissions? This cannot be undone.")) return;
      try {
        const workData = await getWorkData();
        workData.assignments = workData.assignments.filter(a => a.id !== assignmentId);
        workData.submissions = workData.submissions.filter(s => s.assignmentId !== assignmentId);
        await saveWorkData(workData);
        renderAdminManageTab();
      } catch (err) {
        alert("Failed to delete: " + err.message);
      }
    }

    async function submitGrade(submissionId) {
      const score = document.getElementById('score-' + submissionId).value.trim();
      const feedback = document.getElementById('feedback-' + submissionId).value.trim();
      const statusEl = document.getElementById('gradeStatus-' + submissionId);

      if (!score) {
        statusEl.innerHTML = `<div class="status-msg danger">Please enter a score before saving.</div>`;
        return;
      }

      statusEl.innerHTML = `<div class="status-msg info">🔄 Saving and emailing student...</div>`;

      try {
        const workData = await getWorkData();
        const submission = workData.submissions.find(s => s.id === submissionId);
        if (!submission) throw new Error("Submission not found — it may have been deleted.");
        const assignment = workData.assignments.find(a => a.id === submission.assignmentId);

        submission.status = 'graded';
        submission.score = score;
        submission.feedback = feedback;
        submission.gradedAt = new Date().toISOString();

        await saveWorkData(workData);

        // Email the student their result, if they gave an email at submission time.
        if (submission.studentEmail) {
          await sendEmailNotification(submission.studentEmail, `Your assignment has been graded: ${assignment ? assignment.title : ''}`, {
            "Student Name": submission.studentName,
            "Assignment": assignment ? assignment.title : '(deleted assignment)',
            "Score": score,
            "Feedback": feedback || '(no written feedback)',
            "Notify Email": submission.studentEmail
          });
        }

        statusEl.innerHTML = `<div class="status-msg success">✅ Grade saved${submission.studentEmail ? ' and emailed to ' + submission.studentEmail : ' (no email on file — student will see it in the portal)'}.</div>`;
        renderAdminManageTab();
      } catch (err) {
        statusEl.innerHTML = `<div class="status-msg danger">❌ Failed: ${err.message}</div>`;
        console.error(err);
      }
    }

    // ===========================================================
    // STUDENT VIEW
    // ===========================================================
    // Lightweight per-device identity (name/phone/email typed once, remembered
    // locally) — NOT a real account system. It's enough to tag submissions and
    // email results, consistent with the rest of the site's current login setup.
    function getStudentIdentity() {
      const raw = localStorage.getItem('crest_assignment_identity');
      return raw ? JSON.parse(raw) : null;
    }
    function saveStudentIdentity(identity) {
      localStorage.setItem('crest_assignment_identity', JSON.stringify(identity));
    }

    let studentWorkDataCache = { assignments: [], submissions: [] };

    function renderStudentRoot() {
      const identity = getStudentIdentity();
      if (!identity) {
        renderStudentIdentityGate();
      } else {
        renderStudentAssignmentList();
      }
    }

    function renderStudentIdentityGate() {
      const root = document.getElementById('appRoot');
      root.innerHTML = `
        <div class="login-gate">
          <i class="fas fa-graduation-cap"></i>
          <h2>Welcome to the Assignments Portal</h2>
          <p>Enter your details once — this lets your teacher know who submitted what, and where to email your results.</p>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="idName" placeholder="e.g. Chisomo Banda" />
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="text" id="idPhone" placeholder="e.g. 0991234567" />
          </div>
          <div class="form-group">
            <label>Email (optional, for grade notifications)</label>
            <input type="email" id="idEmail" placeholder="you@example.com" />
          </div>
          <div class="form-group">
            <label>Level</label>
            <select id="idLevel" onchange="adaptStudentLevelOptions()">
              <option value="primary">Primary</option>
              <option value="secondary" selected>Secondary</option>
              <option value="tertiary">Tertiary</option>
            </select>
          </div>
          <div class="form-group">
            <label>Class / Form</label>
            <select id="idClass"></select>
          </div>
          <button class="action-btn" onclick="saveStudentIdentityAndContinue()" style="width:100%; justify-content:center; margin-top:10px;"><i class="fas fa-arrow-right"></i> Continue</button>
          <div id="idStatus"></div>
        </div>
      `;
      adaptStudentLevelOptions();
    }

    function adaptStudentLevelOptions() {
      const level = document.getElementById('idLevel').value;
      document.getElementById('idClass').innerHTML = localClasses[level].map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function saveStudentIdentityAndContinue() {
      const name = document.getElementById('idName').value.trim();
      const phone = document.getElementById('idPhone').value.trim();
      const email = document.getElementById('idEmail').value.trim();
      const level = document.getElementById('idLevel').value;
      const className = document.getElementById('idClass').value;

      if (!name || !phone) {
        document.getElementById('idStatus').innerHTML = `<div class="status-msg danger">Please fill in your name and phone number.</div>`;
        return;
      }

      saveStudentIdentity({ name, phone, email, level, className });
      renderStudentRoot();
    }

    function clearStudentIdentity() {
      if (!confirm("Switch user? You'll need to re-enter your details.")) return;
      localStorage.removeItem('crest_assignment_identity');
      renderStudentRoot();
    }

    async function renderStudentAssignmentList() {
      const identity = getStudentIdentity();
      const root = document.getElementById('appRoot');
      root.innerHTML = `
        <div class="panel-card" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
          <div>
            <div style="font-size:14px; font-weight:700; color:#fff;"><i class="fas fa-user" style="color:var(--accent-primary); margin-right:8px;"></i>${identity.name}</div>
            <div style="font-size:11px; color:var(--text-muted); margin-top:2px;">${identity.level} · ${identity.className}</div>
          </div>
          <button class="action-btn ghost small" onclick="clearStudentIdentity()"><i class="fas fa-rotate"></i> Switch User</button>
        </div>
        <div id="studentAssignmentsContainer"><div class="empty-state"><span class="spinner" style="border-top-color:var(--accent-primary);"></span> Loading assignments...</div></div>
      `;

      const workData = await getWorkData();
      studentWorkDataCache = workData;

      const relevant = workData.assignments.filter(a =>
        a.level === 'all' || (a.level === identity.level && (!a.className || a.className === identity.className))
      ).sort((a, b) => new Date(b.postedAt) - new Date(a.postedAt));

      const container = document.getElementById('studentAssignmentsContainer');

      if (relevant.length === 0) {
        container.innerHTML = `<div class="panel-card"><div class="empty-state"><i class="fas fa-inbox" style="font-size:24px; display:block; margin-bottom:10px;"></i>No assignments posted for your class yet. Check back soon!</div></div>`;
        return;
      }

      container.innerHTML = relevant.map(a => renderStudentAssignmentCard(a, identity, workData)).join('');
    }

    function renderStudentAssignmentCard(a, identity, workData) {
      const mySubmission = workData.submissions.find(s => s.assignmentId === a.id && s.studentPhone === identity.phone);
      const overdue = isOverdue(a.dueDate);

      let statusBlock = '';
      if (mySubmission) {
        if (mySubmission.status === 'graded') {
          statusBlock = `
            <div style="margin-top:14px; padding:14px; background:rgba(16,185,129,0.06); border:1px solid rgba(16,185,129,0.2); border-radius:10px;">
              <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:11px; font-weight:700; color:var(--success); text-transform:uppercase;"><i class="fas fa-circle-check"></i> Graded</span>
                <span style="font-size:15px; font-weight:800; color:var(--success);">${mySubmission.score}</span>
              </div>
              ${mySubmission.feedback ? `<div style="margin-top:8px; font-size:12px; color:#e2e8f0; white-space:pre-wrap;">${mySubmission.feedback}</div>` : ''}
            </div>
          `;
        } else {
          statusBlock = `
            <div style="margin-top:14px; padding:12px; background:rgba(245,158,11,0.06); border:1px solid rgba(245,158,11,0.2); border-radius:10px; font-size:12px; color:var(--warn);">
              <i class="fas fa-clock"></i> Submitted ${new Date(mySubmission.submittedAt).toLocaleString()} — awaiting grading.
            </div>
          `;
        }
      } else {
        statusBlock = `
          <div style="margin-top:14px;">
            <div class="form-group full">
              <label>Your Answer (optional if attaching a file)</label>
              <textarea id="ans-${a.id}" placeholder="Type your answer here..."></textarea>
            </div>
            <div class="form-group full">
              <label>Attach File (optional if you typed an answer)</label>
              <div class="upload-zone" onclick="document.getElementById('file-${a.id}').click()">
                <input type="file" id="file-${a.id}" style="display:none;" onchange="handleStudentSubmissionFile(event, '${a.id}')" />
                <i class="fas fa-paperclip"></i>
                <p id="filePrompt-${a.id}">Click to attach your work (PDF, photo, doc)</p>
                <p class="file-tag" id="fileTag-${a.id}"></p>
              </div>
            </div>
            <button class="action-btn small" onclick="submitAssignmentWork('${a.id}')"><i class="fas fa-paper-plane"></i> Submit My Work</button>
            <div id="submitStatus-${a.id}"></div>
          </div>
        `;
      }

      return `
        <div class="panel-card">
          <div class="assignment-card-top">
            <div>
              <div class="assignment-title">${a.title}</div>
              <div class="assignment-meta">
                ${a.subject ? `<span class="meta-chip">${a.subject}</span>` : ''}
                ${a.dueDate ? `<span class="meta-chip ${overdue ? 'overdue' : 'due'}">${overdue ? 'Was due' : 'Due'} ${formatDate(a.dueDate)}</span>` : ''}
              </div>
            </div>
          </div>
          <div class="assignment-instructions">${a.instructions}</div>
          ${a.fileUrl ? `<div class="assignment-attachment"><a href="${a.fileUrl}" target="_blank"><i class="fas fa-paperclip"></i> Download worksheet</a></div>` : ''}
          ${statusBlock}
        </div>
      `;
    }

    const stagedSubmissionFiles = {};
    function handleStudentSubmissionFile(e, assignmentId) {
      const file = e.target.files[0];
      if (!file) return;
      stagedSubmissionFiles[assignmentId] = file;
      document.getElementById('filePrompt-' + assignmentId).style.display = 'none';
      const tag = document.getElementById('fileTag-' + assignmentId);
      tag.textContent = `📎 ${file.name}`;
      tag.style.display = 'block';
    }

    async function submitAssignmentWork(assignmentId) {
      const identity = getStudentIdentity();
      const textAnswer = document.getElementById('ans-' + assignmentId).value.trim();
      const file = stagedSubmissionFiles[assignmentId];
      const statusEl = document.getElementById('submitStatus-' + assignmentId);

      if (!textAnswer && !file) {
        statusEl.innerHTML = `<div class="status-msg danger">Please type an answer or attach a file before submitting.</div>`;
        return;
      }

      statusEl.innerHTML = `<div class="status-msg info">🔄 Submitting your work...</div>`;

      try {
        let fileUrl = null;
        if (file) {
          const cloudData = await uploadToCloudinaryChunked(file, (pct) => {
            statusEl.innerHTML = `<div class="status-msg info">🚀 Uploading your file... ${pct}%</div>`;
          });
          fileUrl = cloudData.secure_url;
        }

        const workData = await getWorkData();
        workData.submissions.push({
          id: generateId(),
          assignmentId,
          studentName: identity.name,
          studentPhone: identity.phone,
          studentEmail: identity.email || '',
          textAnswer,
          fileUrl,
          status: 'submitted',
          submittedAt: new Date().toISOString()
        });
        await saveWorkData(workData);

        statusEl.innerHTML = `<div class="status-msg success">✅ Submitted! Your teacher will grade it and you'll see the result here${identity.email ? ' (and by email)' : ''}.</div>`;
        delete stagedSubmissionFiles[assignmentId];
        setTimeout(() => renderStudentAssignmentList(), 1200);
      } catch (err) {
        statusEl.innerHTML = `<div class="status-msg danger">❌ Submission failed: ${err.message}</div>`;
        console.error(err);
      }
    }

    // ===========================================================
    // ENTRY POINT
    // ===========================================================
    if (isAdminView) {
      renderAdminRoot();
    } else {
      renderStudentRoot();
    }
  </script>
</body>
</html>
